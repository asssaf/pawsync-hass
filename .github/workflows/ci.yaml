name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff check
        run: ruff check .
      - name: Run Ruff format
        run: ruff format --check .
